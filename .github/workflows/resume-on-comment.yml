name: Resume blocked decomposition

# When an agent in the task-decomposition pipeline gets stuck it comments a question,
# @mentions the owner, labels the issue `status:blocked`, and stops. This workflow lets
# the owner resume simply by REPLYING on that issue — no slash command, no @claude needed.
on:
  issue_comment:
    types: [created]

# NOTE: permissions MUST live at the job level. GitHub job-level `permissions` fully
# OVERRIDES (does not merge with) any workflow-level block, so `id-token: write` has to
# be here or the claude-code-action OIDC token request fails
# ("Could not fetch an OIDC token"). A workflow-level block would be silently shadowed.
jobs:
  resume:
    # Resume only when: the issue carries `status:blocked`, the comment is a human's
    # (not a bot — avoids the agent answering itself / loops), and it's an issue not a PR.
    if: |
      !github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      contains(github.event.issue.labels.*.name, 'status:blocked')
    runs-on: ${{ vars.AGENT_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Superseded-close re-check (#1253) ────────────────────────────────────────
      # The job guard reads labels from the EVENT PAYLOAD snapshot — a close seconds
      # before the reply still passes it (the #1233 race: PR #1234's stray `Closes`
      # auto-closed the retest issue 2s before the owner's answer). And the artifact-gate
      # below counts `closed` as PASS, so a resume against a superseded issue would exit
      # green having done nothing. Re-fetch live state: if the issue is now CLOSED, tell
      # the owner plainly and skip the agent run. Fail-OPEN on an API error (proceed as
      # before) — a transient fetch failure must not eat a legitimate resume. The
      # merge-on-approval step below stays `if: always()` on purpose: the #572
      # deterministic-merge fallback must survive this early exit.
      - name: Re-check the issue is still open
        id: state
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number
            let issue
            try {
              issue = (await github.rest.issues.get({ ...context.repo, issue_number })).data
            } catch (e) {
              core.warning(`state re-check failed (${e.message}) — proceeding as open`)
              core.setOutput('open', 'true'); return
            }
            const open = issue.state === 'open'
            core.setOutput('open', String(open))
            if (open) return
            const closer = issue.closed_by ? issue.closed_by.login : 'unknown'
            await github.rest.issues.createComment({ ...context.repo, issue_number,
              body: '> 🤖 **Claude Code** · agent pipeline (CI) · _resume skipped — issue already closed (#1253)_\n\n'
                + `⚠️ This issue was **closed** (by ${closer}) just before your reply was picked up, so the resume did **not** run — `
                + 'it looks superseded. Reply on the successor issue/PR instead, or **reopen this one and comment again** to retry.' })
            core.info(`Issue #${issue_number} is closed — skipping the resume agent run.`)

      # Acknowledge the trigger comment immediately: 👀 = "picked up, working on it". The
      # final step swaps this for 🚀 (done) / 😕 (failed). The job guard already ensures we
      # only get here for comments we actually act on, so the reaction is never spurious.
      # (GitHub comment reactions have no ✅/❌ — 🚀/😕 are the closest.)
      - name: React 👀 — resume picked up
        if: steps.state.outputs.open == 'true'
        id: eyes
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const r = await github.rest.reactions.createForIssueComment({
                ...context.repo, comment_id: context.payload.comment.id, content: 'eyes',
              })
              core.setOutput('id', String(r.data.id))
            } catch (e) { core.warning(`could not add 👀 reaction: ${e.message}`) }

      # Timestamp run start so the artifact-gate (below) can tell "produced during THIS run".
      - id: t0
        if: steps.state.outputs.open == 'true'
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      # ── Collect the answer payload across media (WS5, #1191) ─────────────────────
      # The owner may answer in the medium the question came in — a top-level reply, an
      # inline PR *review* comment (e.g. on a schema `.md`), a `🎯 Preview feedback`
      # comment, or an edited Excalidraw diagram. The resume agent only reads the top-level
      # thread by default, so an in-medium answer would be invisible. This gathers all of
      # them into `.resume-answer.md` for the prompt below. Dependency-free (system node +
      # fetch); the `||` fallback guarantees the file exists so the resume never fails on it.
      - name: Collect the answer payload
        if: steps.state.outputs.open == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
        run: |
          node scripts/resume-answer-payload.mjs "$ISSUE" > .resume-answer.md \
            || echo '_(answer-payload collection skipped — resume from the top-level thread)_' > .resume-answer.md
          echo "── collected answer payload ──"; cat .resume-answer.md

      # Pinned to the same SHA as claude.yml — keep these in sync when bumping.
      # AUTH: this is headless/unattended, so it MUST use an API key. Do NOT swap in a
      # subscription CLAUDE_CODE_OAUTH_TOKEN — subscription OAuth is for interactive
      # Claude Code use only, not CI automation (Anthropic Legal & Compliance terms).
      - id: agent
        if: steps.state.outputs.open == 'true'
        uses: anthropics/claude-code-action@6c0083bb7289c31716797a039b6367b3079cc46e
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Resume the task-decomposition pipeline for issue #${{ github.event.issue.number }}.
            The owner has replied to a blocking question. Their answer may be in the medium the
            question came in — this run collected it across every surface into `.resume-answer.md`
            (the latest reply, any inline PR review comments, any `🎯` preview-feedback comments,
            and a flag if an Excalidraw diagram was edited). **Read `.resume-answer.md` first** and
            treat it as their answer; if it flags an edited diagram, run
            `node scripts/ticket-excalidraw-import.mjs <png>` to decode the scene before acting.
            Then incorporate the answer, remove the `status:blocked` label, and continue via
            /task-decompose #${{ github.event.issue.number }}.
          claude_args: "--model claude-sonnet-5 --max-turns 30"
          show_full_output: true

      # Ship the payload-free invocation trace for the weekly usage rollup (#1064).
      - uses: ./.github/actions/loop-station-trace
        if: always()
      # Mint a Nuxt Harness App token for the merge step. CRUCIAL: the merge MUST use the
      # App token, NOT the default GITHUB_TOKEN — GitHub suppresses workflow triggers for
      # events initiated by GITHUB_TOKEN, so a GITHUB_TOKEN merge's `pull_request: closed`
      # event would NOT reach schedule-waves and the chain stalls (the #572 first-attempt
      # regression). An App installation token is a non-GITHUB_TOKEN actor, so its merge
      # fires schedule-waves → close issue → release next workstream. (#535/#519 WS5.)
      - uses: actions/create-github-app-token@v1
        id: app-token
        if: always()
        with:
          app-id: ${{ secrets.HARNESS_APP_ID }}
          private-key: ${{ secrets.HARNESS_APP_PRIVATE_KEY }}
          owner: FriendlyInternet

      # ── Merge-on-approval (#572) ───────────────────────────────────────────────
      # The pipeline's design is that a sign-off gate's sub-PR merges into the EPIC
      # branch once approved — the owner's `approve`/`lgtm` IS the review. Nothing
      # implemented that, so approved gates STALLED: the gate PR stayed a draft, its
      # issue never closed, and schedule-waves never released the next workstream.
      # This deterministically completes the handoff on an approval comment, regardless
      # of what the agent step above did. Merge commit — NOT squash (preserve curated
      # commits; merge policy). Merges with the App token so the resulting
      # `pull_request: closed` event TRIGGERS schedule-waves → close issue → release the
      # next workstream (a GITHUB_TOKEN merge does NOT cascade — #572).
      - name: Merge the gate PR on approval
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue_number = context.payload.issue.number
            const body = context.payload.comment.body || ''
            // Approval only — a change-request reply must NOT merge anything.
            if (!/\b(approve|approved|lgtm)\b/i.test(body)) {
              core.info('Comment is not an approval — nothing to merge.'); return
            }
            // Find the PR(s) that close THIS issue, via the issue timeline cross-references.
            const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
              ...context.repo, issue_number,
            })
            const prNums = [...new Set(timeline
              .filter(e => e.event === 'cross-referenced' && e.source && e.source.issue && e.source.issue.pull_request)
              .map(e => e.source.issue.number))]
            let merged = false
            for (const n of prNums) {
              let pr
              try { pr = (await github.rest.pulls.get({ ...context.repo, pull_number: n })).data } catch { continue }
              if (pr.state !== 'open' || pr.merged) continue
              // Only the gate PR: it says "Closes #<issue>" and targets an epic branch.
              if (!new RegExp(`\\bcloses\\s+#${issue_number}\\b`, 'i').test(pr.body || '')) continue
              if (!/^epic\//.test(pr.base.ref)) {
                core.info(`PR #${n} base ${pr.base.ref} is not an epic branch — skipping.`); continue
              }
              // Mark ready (REST can't flip draft→ready; GraphQL can), then merge.
              if (pr.draft) {
                try {
                  await github.graphql(
                    `mutation($id:ID!){ markPullRequestReadyForReview(input:{pullRequestId:$id}){ pullRequest { id } } }`,
                    { id: pr.node_id })
                } catch (e) { core.warning(`markReady #${n}: ${e.message}`) }
              }
              try {
                await github.rest.pulls.merge({ ...context.repo, pull_number: n, merge_method: 'merge' })
                merged = true
                core.info(`Merged gate PR #${n} into ${pr.base.ref}.`)
              } catch (e) { core.warning(`merge #${n} failed: ${e.message}`) }
            }
            // Clear the block defensively so the issue can close cleanly.
            try { await github.rest.issues.removeLabel({ ...context.repo, issue_number, name: 'status:blocked' }) } catch (e) {}
            core.info(merged ? 'Gate PR merged — schedule-waves will advance the chain.' : 'No gate PR merged (none matched / already merged).')

      # ── Artifact-gate (#603 P0) ────────────────────────────────────────────────
      # A resume must PRODUCE something — otherwise a no-op silently exits green and the
      # run looks done while nothing advanced. That exact failure bit #590: a plan-gate
      # `approve` resumed, cleared `status:blocked`, but created ZERO sub-issues; the green
      # run hid it and it took a manual re-/delegate to notice. `decompose-on-issue` already
      # has this gate; the resume path didn't. Now a no-op resume goes RED (visible →
      # re-dispatch). Uses GITHUB_TOKEN (read-only check), never trips the bot-actor guard.
      # Skipped on the superseded-close path (#1253): with no agent run there's no artifact
      # to demand, and the state re-check already commented. Exports its facts as outputs
      # so the success comment below can say WHAT the resume produced.
      - name: Artifact-gate — fail if the resume produced nothing
        id: gate
        if: always() && steps.state.outputs.open == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number
            const since = '${{ steps.t0.outputs.ts }}'
            const sinceMs = new Date(since).getTime()

            // (a) sub-issues created this run (a plan/decompose gate proceeding)
            let createdSubIssues = false
            try {
              const subs = await github.paginate('GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues', {
                ...context.repo, issue_number, per_page: 100,
              })
              createdSubIssues = subs.some(s => new Date(s.created_at).getTime() >= sinceMs)
            } catch (e) { core.warning(`sub-issue check skipped: ${e.message}`) }

            // (b) a comment posted this run (an answer / progress / revision note)
            const comments = await github.paginate(github.rest.issues.listComments, { ...context.repo, issue_number, since })
            const newComment = comments.length > 0

            // (c) issue state now
            const issue = (await github.rest.issues.get({ ...context.repo, issue_number })).data
            const closed = issue.state === 'closed'
            const stillBlocked = issue.labels.some(l => (typeof l === 'string' ? l : l.name) === 'status:blocked')

            // (d) a gate PR merged this run (a sign-off gate approved + merged)
            let mergedPR = false
            try {
              const tl = await github.paginate(github.rest.issues.listEventsForTimeline, { ...context.repo, issue_number })
              const prNums = [...new Set(tl.filter(e => e.event === 'cross-referenced' && e.source && e.source.issue && e.source.issue.pull_request).map(e => e.source.issue.number))]
              for (const n of prNums) {
                const pr = (await github.rest.pulls.get({ ...context.repo, pull_number: n })).data
                if (pr.merged_at && new Date(pr.merged_at).getTime() >= sinceMs) { mergedPR = true; break }
              }
            } catch (e) { core.warning(`merged-PR check skipped: ${e.message}`) }

            core.setOutput('subIssues', String(createdSubIssues))
            core.setOutput('mergedPR', String(mergedPR))
            core.setOutput('closed', String(closed))
            core.setOutput('stillBlocked', String(stillBlocked))
            core.setOutput('newComment', String(newComment))

            // PASS if the resume did anything observable, OR it's still holding (legit "still
            // iterating" — not a no-op). FAIL only when the block was cleared yet nothing came
            // of it — the silent no-op.
            if (createdSubIssues || mergedPR || closed || newComment || stillBlocked) {
              core.info(`Resume artifact OK: subIssues=${createdSubIssues} mergedPR=${mergedPR} closed=${closed} newComment=${newComment} stillBlocked=${stillBlocked}`)
              return
            }
            await github.rest.issues.createComment({ ...context.repo, issue_number,
              body: '> 🤖 **Claude Code** · agent pipeline (CI) · _resume artifact-gate (#603)_\n\n'
                + '⚠️ The resume ran but produced **nothing** (no sub-issues, no merged gate PR, no new '
                + 'comment, not closed, and the block was cleared) — a silent no-op (the #590 failure mode). '
                + 'Re-dispatch with `/delegate` to retry.' })
            core.setFailed(`Resume on #${issue_number} produced no artifact — likely a no-op; re-dispatch.`)

      # Final feedback on the trigger comment: clear the 👀 and stamp the outcome — 🚀 done /
      # 😕 failed (GitHub reactions have no ✅/❌). Comment ONLY on a hard agent error; a no-op
      # is already explained by the artifact-gate above, so we don't duplicate it (#1216).
      - name: React outcome — 🚀 done / 😕 failed
        if: always() && steps.state.outputs.open == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const comment_id = context.payload.comment.id
            const ok = '${{ job.status }}' === 'success'
            const rid = '${{ steps.eyes.outputs.id }}'
            if (rid) {
              try { await github.rest.reactions.deleteForIssueComment({ ...context.repo, comment_id, reaction_id: Number(rid) }) }
              catch (e) { core.warning(`could not remove 👀: ${e.message}`) }
            }
            try {
              await github.rest.reactions.createForIssueComment({ ...context.repo, comment_id, content: ok ? 'rocket' : 'confused' })
            } catch (e) { core.warning(`could not add outcome reaction: ${e.message}`) }
            // Comment only when the agent step itself errored (billing / max-turns / tooling) —
            // the artifact-gate already comments on the no-op case, so this avoids a duplicate.
            if (!ok && '${{ steps.agent.outcome }}' === 'failure') {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.payload.issue.number,
                body: '> 🤖 **Claude Code** · agent pipeline (CI) · _resume failed_\n\n'
                  + '😕 The resume from your comment **errored before finishing** (billing / max-turns / tooling). '
                  + `🔗 [Run log](${runUrl}) — fix the cause, then comment again to retry.` })
            }

      # ── Visible success (#1253, Fix A) ───────────────────────────────────────────
      # A successful resume used to signal ONLY via the 🚀 reaction — easy to miss,
      # especially on mobile (the #1233 "felt ignored" incident), and our own conventions
      # call a reaction the weak signal. Post a top-level comment saying what the run
      # produced, from the artifact-gate's own facts. ORDERING IS LOAD-BEARING: this step
      # MUST come after the artifact-gate — a comment posted before it would make the
      # gate's `newComment` check always-true and permanently disable the #603 no-op
      # detection. Skipped when the agent already replied in-thread this run (no double
      # ping — the gate's `newComment` flag knows). Posted with GITHUB_TOKEN on purpose:
      # a Bot actor whose events never re-trigger this workflow (double loop safety on
      # top of the job's `user.type != 'Bot'` guard).
      - name: Comment ✅ — visible success
        if: success() && steps.state.outputs.open == 'true' && steps.gate.outputs.newComment != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const facts = []
            if ('${{ steps.gate.outputs.subIssues }}' === 'true') facts.push('created sub-issues')
            if ('${{ steps.gate.outputs.mergedPR }}' === 'true') facts.push('merged the gate PR')
            if ('${{ steps.gate.outputs.closed }}' === 'true') facts.push('closed this issue')
            if ('${{ steps.gate.outputs.stillBlocked }}' === 'true') facts.push('still iterating — the block stays on for your next reply')
            const did = facts.length ? facts.join(' · ') : 'continued the pipeline'
            await github.rest.issues.createComment({ ...context.repo, issue_number,
              body: '> 🤖 **Claude Code** · agent pipeline (CI) · _resumed from your reply (#1253)_\n\n'
                + `✅ **Resumed from your reply** — ${did}. 🔗 [Run log](${runUrl})` })

      # A cancelled resume (the 30-min timeout) must announce itself, not vanish silently (#1220).
      - name: Flag a timeout / cancellation
        if: cancelled()
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            await github.rest.issues.createComment({ ...context.repo, issue_number,
              body: '> 🤖 **Claude Code** · agent pipeline (CI) · _resume timed out_\n\n'
                + '⏱️ This resume was **cancelled** — almost always the 30-min job timeout. It may have '
                + `partially progressed. 🔗 [Run log](${runUrl}) — comment again to retry.` })
