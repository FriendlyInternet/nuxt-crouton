name: routing-registry

# Keep .claude/routing.json, the generated writeups/architecture/routing-registry.md, AND the real
# .claude/agents/*.md model frontmatter in sync (WS6a / #864, guard #1029). `gen-routing.mjs --check`
# fails if the registry is stale OR if a route's tier drifts from the model an agent actually pins —
# the exact silent drift that bit us (task-orchestrator/decomposer → opus without a routing.json update).
# gen-routing.mjs parses .claude/routing.json with a Node built-in (JSON.parse), so no install step is needed.

on:
  pull_request:
    paths:
      - '.claude/routing.json'
      - '.claude/agents/**'          # an agent model change is the drift we guard against
      - 'scripts/gen-routing.mjs'
      - 'writeups/architecture/routing-registry.md'
  push:
    branches: [main]
    paths:
      - '.claude/routing.json'
      - '.claude/agents/**'
      - 'scripts/gen-routing.mjs'

# Cancel superseded PR runs when a new commit is pushed; each PR is its own group
# (ref in the key). cancel-in-progress is event-conditional so a push→main run is
# NEVER cancelled mid-flight. (#1523)
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Verify routing registry is current + matches agent frontmatter
        run: node scripts/gen-routing.mjs --check
