name: epic-digest

# Daily "where are we?" roundup, delivered by email via Resend. Deterministic
# (no LLM) — gathers via the GitHub API with the built-in GITHUB_TOKEN, renders
# email-safe HTML + a plain-text mirror, and emails it. See
# .claude/skills/epic-digest/ (gather.mjs → render.mjs).
#
# Cadence-as-data (#637/#1139): the cron fires DAILY (cheap wake-up); the `gate`
# step reads .github/digests.yml via schedule.mjs and exits the run early on
# non-send days. Change the cadence in digests.yml — never this cron. A manual
# workflow_dispatch always sends (FORCE).

on:
  schedule:
    # Daily wake-up ~06:00 Europe/Brussels (UTC cron can't track DST); the real
    # send day comes from .github/digests.yml via the gate step below.
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: epic-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cadence gate (#1139): digests.yml decides whether today is a send day.
      # Manual dispatch forces a send. Everything below is skipped when send=false.
      - name: Schedule gate
        id: gate
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: node .claude/skills/housekeeping/schedule.mjs epic-digest

      - name: Gather the issue tree
        if: steps.gate.outputs.send == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
        run: node .claude/skills/epic-digest/gather.mjs > digest.data.json

      # Render email-safe HTML + a plain-text mirror (no LLM, no network).
      - name: Render the digest
        if: steps.gate.outputs.send == 'true'
        run: node .claude/skills/epic-digest/render.mjs digest.data.json --out-dir .

      # Deliver by email via Resend. Shares the sender var (RESEND_FROM) with
      # red-team-daily.yml; recipient is its own (DIGEST_REPORT_EMAIL). When the
      # secret/vars are unset the step warns and skips so the job stays green.
      - name: Email the digest (Resend)
        if: steps.gate.outputs.send == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.RESEND_FROM }}
          EMAIL_TO: ${{ vars.DIGEST_REPORT_EMAIL }}
        run: |
          HTML=$(ls -t epic-digest-*.html 2>/dev/null | head -1 || true)
          TXT=$(ls -t epic-digest-*.txt 2>/dev/null | head -1 || true)
          if [ -z "$HTML" ] || [ -z "$TXT" ]; then
            echo "::warning::No rendered digest HTML/text found — nothing to email."
            exit 0
          fi
          if [ -z "$RESEND_API_KEY" ] || [ -z "$EMAIL_FROM" ] || [ -z "$EMAIL_TO" ]; then
            echo "::warning::RESEND_API_KEY / RESEND_FROM / DIGEST_REPORT_EMAIL not set — skipping email (nothing delivered)."
            exit 0
          fi
          SUBJECT="$(head -1 epic-digest-*.subject.txt 2>/dev/null)"
          [ -z "$SUBJECT" ] && SUBJECT="Daily epic digest — $(date -u +%F)"
          echo "Emailing $HTML → $EMAIL_TO  (subject: $SUBJECT)"
          # Build the JSON payload with jq so the HTML/text bodies are safely escaped.
          jq -n \
            --arg from "$EMAIL_FROM" \
            --arg to "$EMAIL_TO" \
            --arg subject "$SUBJECT" \
            --rawfile html "$HTML" \
            --rawfile text "$TXT" \
            '{from:$from, to:[$to], subject:$subject, html:$html, text:$text}' \
          | curl -sS -X POST https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d @- -w '\nHTTP %{http_code}\n'

      - name: Upload digest artifacts
        if: always() && steps.gate.outputs.send == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: epic-digest
          path: |
            digest.data.json
            epic-digest-*.html
            epic-digest-*.txt
            epic-digest-*.subject.txt
          if-no-files-found: ignore
