name: Deploy Apps (Cloudflare Workers)

# ONE generic deploy for every apps/<name> (epic #481, WS2). Replaces the per-app
# deploy-<name>.yml callers (deploy-velo/triage/fanfare.yml) so the agent pipeline never
# has to push a .github/workflows/ file (its App token lacks the `workflows` scope — what
# blocked #457). An app opts in by committing apps/<name>/deploy.config.json (which the bot
# CAN push, it's under apps/, not .github/).
#
# Triggers:
#   • push to main touching apps/** or a watched package → STAGING for each app whose
#     deploy.config.json `watchPaths` match the changed files (trunk = staging, #347).
#   • pull_request touching the same → STAGING preview for each matching app.
#   • workflow_dispatch(app, environment) → deploy ONE named app to staging OR production.
#
# 🟦 STANDING RULE #318 — production is reachable ONLY via a deliberate workflow_dispatch
# with environment=production. push/pull_request NEVER set `environment`, so they always
# resolve to staging: the detect job below hard-codes env=staging for those events, and a
# `push` can never produce a production matrix entry. This holds structurally, not by
# convention. For prod, use the /deploy-production skill (which dispatches this with
# environment=production).
#
# Each app is deployed by the reusable deploy-app.yml (workspace: apps). Per-app settings
# (stagingUrl / productionUrl / layerPackages / watchPaths) live in deploy.config.json.

on:
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-apps.yml'
      - '.github/workflows/deploy-app.yml'
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-apps.yml'
      - '.github/workflows/deploy-app.yml'
  workflow_dispatch:
    inputs:
      app:
        description: App directory name under apps/ (e.g. velo)
        required: true
        type: string
      environment:
        description: 'Deploy target — production is GATED (deliberate dispatch only, #318)'
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      review_pr:
        description: >-
          Optional PR number to wire the preview-review bridge to (#607). Set it to
          make a manually-dispatched staging preview's in-page overlay comments post to
          that PR. Leave empty to deploy without the bridge. Ignored for production.
        required: false
        type: string
      skip_staging_smoke:
        description: >-
          ESCAPE HATCH (#1107): skip the pre-prod confidence gate that smokes the live
          staging URL before a production deploy. Only for "staging is down and prod
          needs a hotfix" — the run carries a loud warning. Ignored for staging.
        required: false
        default: false
        type: boolean

# Cancel superseded PR *preview* runs when a new commit is pushed to the same PR branch.
# cancel-in-progress is event-conditional (`pull_request` only) so a push→main STAGING
# deploy + D1 migration and a workflow_dispatch PRODUCTION deploy are NEVER cancelled
# mid-flight — cancelling a running deploy/migration is dangerous (#318, #1523). This
# concurrency sits on the caller; the reusable deploy-app.yml inherits it, so groups are
# per-app/PR here (not on the leaf) — no cross-app cancellation.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Figure out which opted-in apps to deploy (and to which env) → a matrix the deploy
  # job fans out over. push/pull_request → STAGING only (env hard-coded below, #318).
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set
        env:
          EVENT: ${{ github.event_name }}
          DISPATCH_APP: ${{ github.event.inputs.app }}
          DISPATCH_ENV: ${{ github.event.inputs.environment }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.after }}
        # The decision lives in the pure, unit-tested scripts/deploy-detect.mjs (mirrors
        # scripts/packages-guard.mjs). It fixes #1499: the old inline bash used
        # `git diff … 2>/dev/null || true`, which turned a FAILED diff into an empty one —
        # indistinguishable from "nothing changed" — so a merge that should have deployed was
        # silently skipped while the run went green. The script never swallows a diff failure:
        # on push it prefers the merge's first-parent diff (robust to concurrent pushes) and
        # exits NON-ZERO (loud red → report-failed-deploy fires) if it can't compute a diff or
        # the changed-file set comes back empty on a triggered push/PR. Contract:
        # scripts/deploy-detect.test.mjs (`node --test`).
        run: node scripts/deploy-detect.mjs

  # One deploy-app.yml call per detected app. Skipped cleanly when nothing opted-in changed.
  deploy:
    needs: detect
    if: needs.detect.outputs.any == 'true'
    permissions:
      contents: read
      pull-requests: write   # reusable workflow comments the preview URL on the PR
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/deploy-app.yml
    with:
      app: ${{ matrix.app }}
      workspace: apps
      environment: ${{ matrix.environment }}
      staging-url: ${{ matrix.stagingUrl }}
      production-url: ${{ matrix.productionUrl }}
      layer-packages: ${{ matrix.layerPackages }}
      # PR-tied deploys wire the preview-review bridge to this PR (#607); on a manual
      # dispatch use the optional review_pr input; empty → the bridge stays off.
      review-pr: ${{ github.event.pull_request.number || github.event.inputs.review_pr }}
      # Rung 3 escape hatch (#1107) — only a manual dispatch can set it; push/PR
      # events have no such input, so this resolves false for them (and the gate
      # itself only fires on environment=production anyway).
      skip-staging-smoke: ${{ inputs.skip_staging_smoke || false }}
      # From deploy.config.json secrets.required — fail loudly when the app expects
      # a WORKER_SECRETS_JSON bundle but it resolves empty (mis-scoped, #1094).
      require-worker-secrets: ${{ matrix.requireWorkerSecrets || false }}
    secrets: inherit

  # "Cancelled ≠ failed" (#1150): deploy-app.yml's per-app concurrency group
  # (deploy-<app>-<env>, cancel-in-progress: false) allows ONE waiting run per
  # app, so a sibling PR's (or main's) newer run replaces — cancels — an older
  # queued preview deploy. The resulting ✕ is queue mechanics, not a failure,
  # but it reads as one (the #1127 diagnosis round). Say so on the PR.
  report-bumped-preview:
    needs: [detect, deploy]
    if: always() && github.event_name == 'pull_request' && needs.deploy.result == 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment "bumped, not broken" on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '<!-- deploy-bumped -->',
              '⏳ **Preview deploy bumped, not broken — nothing about this PR failed.**',
              '',
              'A newer run took the shared per-app staging queue slot (a sibling PR, or a merge to `main` deploying the same app), so this preview was cancelled.',
              '',
              '**To get the preview:** re-run the failed jobs of the **Deploy Apps** run, or push any commit.',
              '',
              '<sub>🤖 agent pipeline · preview-deploy queue notice (#1150)</sub>'
            ].join('\n')
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, per_page: 100
            })
            const existing = comments.reverse().find(c => c.body && c.body.startsWith('<!-- deploy-bumped -->'))
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body })
            }
